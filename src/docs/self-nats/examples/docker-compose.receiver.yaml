services:
  proxy-gateway-receiver:
    image: <registry>/<image>:<tag>
    container_name: proxy-gateway-receiver
    restart: unless-stopped

    environment:
      # Service role and upstream target.
      SERVICE_ROLE: receiver
      SERVICE_ID: <receiver_service_id>
      UPSTREAM_URL: <upstream_base_url>
      PORT: 7000
      RACK_ENV: production

      # Gateway service -> local embedded NATS connection.
      NATS_URL: nats://127.0.0.1:4222
      NATS_MODE: jetstream
      NATS_STREAM: <stream_name>
      NATS_CONSUMER_NAME: <receiver_consumer_name>
      NATS_REQUEST_SUBJECT_ROOT: <request_subject_root>
      NATS_RESPONSE_SUBJECT_ROOT: <response_subject_root>
      LISTEN_SUBJECT: <request_subject_root>.requests.>

      # Optional if JetStream API must be routed via custom domain.
      # Leave empty to use auto-resolved value from entrypoint.
      NATS_JS_API_PREFIX: ""

      # Bridge timeouts.
      NATS_RESPONSE_TIMEOUT: 30
      STREAM_RESPONSE_TIMEOUT: 30
      RECEIVER_MAX_INFLIGHT: 20

      # Embedded NATS enabled with generated config.
      EMBEDDED_NATS_ENABLED: "true"
      EMBEDDED_NATS_GENERATE_CONFIG: "true"
      EMBEDDED_NATS_GENERATED_CONFIG_PATH: /data/nats.conf

      # Receiver defaults usually keep JetStream enabled.
      EMBEDDED_NATS_JETSTREAM_ENABLED: "true"
      EMBEDDED_NATS_JETSTREAM_STORE_DIR: /data

      # Optional JetStream domain for leaf/account routing scenarios.
      EMBEDDED_NATS_JS_DOMAIN: ""

      # Leaf listener exposed by receiver.
      EMBEDDED_NATS_LEAF_LISTEN_HOST: 0.0.0.0
      EMBEDDED_NATS_LEAF_LISTEN_PORT: 7422

      # Define fixed credentials or leave empty for auto-generation.
      EMBEDDED_NATS_LEAF_USER: <leaf_listener_user>
      EMBEDDED_NATS_LEAF_PASSWORD: <leaf_listener_password>

      # Readiness tuning for internal stream bootstrap.
      EMBEDDED_NATS_READY_RETRIES: 40
      EMBEDDED_NATS_READY_SLEEP_SEC: 1

    ports:
      - "7000:7000"
      - "7422:7422"
      - "4222:4222"

    volumes:
      - receiver-data:/data

volumes:
  receiver-data:
